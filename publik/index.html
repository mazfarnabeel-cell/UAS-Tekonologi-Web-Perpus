<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Buku Perpustakaan</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>📚 Manajemen Buku Perpustakaan</h1>

        <form id="formBuku">

            <div class="form-group">
                <label>Judul Buku</label>
                <input
                    type="text"
                    id="judul"
                    placeholder="Masukkan Judul Buku"
                    required>
            </div>

            <div class="form-group">
                <label>Penulis</label>
                <input
                    type="text"
                    id="penulis"
                    placeholder="Masukkan Nama Penulis"
                    required>
            </div>

            <div class="form-group">
                <label>Penerbit</label>
                <input
                    type="text"
                    id="penerbit"
                    placeholder="Masukkan Nama Penerbit"
                    required>
            </div>

            <div class="form-group">
                <label>Tahun Terbit</label>
                <input
                    type="number"
                    id="tahun"
                    placeholder="Contoh : 2024"
                    required>
            </div>

            <div class="form-group">
                <label>Stok</label>
                <input
                    type="number"
                    id="stok"
                    placeholder="Masukkan Jumlah Stok"
                    required>
            </div>

            <button type="submit">
                Simpan Buku
            </button>

        </form>

        <hr>

        <h2>Daftar Buku</h2>

        <table>

            <thead>

                <tr>

                    <th>No</th>
                    <th>Judul</th>
                    <th>Penulis</th>
                    <th>Penerbit</th>
                    <th>Tahun</th>
                    <th>Stok</th>
                    <th>Aksi</th>
                    <th>Aksi</th>

                </tr>

            </thead>

            <tbody id="dataBuku">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
